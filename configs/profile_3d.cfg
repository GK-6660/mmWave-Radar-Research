% --- 关键修改区 ---
% 开启所有监控，确保点云 (Type 1) 和 侧影 (Type 2) 都能出来
guiMonitor -1 1 1 0 0 0 1 

% 降低 CFAR 阈值到 5.0，让雷达更灵敏，能看到手指
cfarCfg -1 0 2 8 4 3 0 5.0 0
cfarCfg -1 1 0 4 2 3 1 5.0 0

% 暂时关闭静态杂波消除，让我们先看到“人影”再说
clutterRemoval -1 0 

% 扩大距离范围到 2.0米，防止你站得稍远就看不见
cfarFovCfg -1 0 0.10 2.0
cfarFovCfg -1 1 -20.16 20.16
aoaFovCfg -1 -90 90 -90 90
